<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body class="mirror-body">

<canvas id="flame-canvas" class="flame-canvas"></canvas>

<nav class="mode-nav mirror-nav">
  <a href="/" class="mode-link">Sensing</a>
  <a href="/observe" class="mode-link">Observation</a>
  <a href="/mirror" class="mode-link active">Mirror</a>
  <a href="/game1" class="mode-link">Game 1</a>
</nav>

<div class="mirror-subtitle">breath as flame</div>

<div class="mirror-status">
  <span class="dot-indicator" id="track-dot"></span>
  <span id="track-text">tracking…</span>
  <span class="status-sep">·</span>

<canvas id="roi-canvas" class="hidden-video"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>

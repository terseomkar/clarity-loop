<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clarity Loop — Week 3</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

<div class="dev-view">

  <nav class="mode-nav">
    <a href="/" class="mode-link active">Sensing</a>
    <a href="/observe" class="mode-link">Observation</a>
    <a href="/mirror" class="mode-link">Mirror</a>
    <a href="/game1" class="mode-link">Game 1</a>
  </nav>

  <div class="dev-header">
    <h1>Clarity Loop</h1>
    <p>Week 3 · Full Sensing Layer</p>
  </div>

  <!-- Camera preview -->
  <div class="camera-section">
    <video id="camera-feed" playsinline muted autoplay></video>
    <canvas id="roi-canvas" class="roi-overlay"></canvas>
  </div>

  <!-- Live metrics -->
  <div class="metrics-grid">
    <div class="metric-card">
      <span class="metric-label">Heart Rate</span>
      <span class="metric-value" id="bpm-value">—</span>
      <span class="metric-unit">BPM</span>
    </div>
    <div class="metric-card">
      <span class="metric-label">Respiration</span>
      <span class="metric-value" id="rr-value">—</span>
      <span class="metric-unit">BR / MIN</span>
    </div>
    <div class="metric-card">
      <span class="metric-label">Restlessness</span>
      <span class="metric-value" id="restless-value">—</span>
      <span class="metric-unit">0 — 1</span>
    </div>
    <div class="metric-card">
      <span class="metric-label">Posture</span>
      <span class="metric-value" style="font-size:14px;line-height:1.4;padding-top:2px" id="posture-lines">—</span>
    </div>
    <div class="metric-card wide">
      <span class="metric-label">Physio State</span>
      <span class="metric-value" style="font-size:20px;padding-top:4px" id="phys-state">unknown</span>
      <span class="metric-unit" id="baseline-status">baseline: warming up…</span>
    </div>
  </div>

  <!-- Status pills -->
  <div class="status-row">
    <div class="status-pill">
      <div class="status-dot" id="dot-ws"></div>
      <span>WS&nbsp;<span id="ws-status">—</span></span>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="dot-signal"></div>
      <span>Signal&nbsp;<span id="signal-quality">waiting</span></span>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="dot-face"></div>
      <span id="face-status">no face</span>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="dot-pose"></div>
      <span id="pose-status">no pose</span>
    </div>
  </div>

  <p id="status-msg">Initialising camera…</p>

</div>

<!-- MediaPipe Face Mesh (Week 2) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>

<!-- MediaPipe Pose (Week 3 — posture + restlessness) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>

<script src="/static/js/websocket.js"></script>
<script src="/static/js/camera.js"></script>
<script>
  document.addEventListener('ws:open',  () => {
    document.getElementById('dot-ws').className = 'status-dot ok';
  });
  document.addEventListener('ws:close', () => {
    document.getElementById('dot-ws').className = 'status-dot bad';
  });
</script>
<script src="/static/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clarity Loop — Week 1 Validation</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

<div class="dev-view">

  <div class="dev-header">
    <h1>Clarity Loop</h1>
    <p>Week 1 · CV Validation</p>
  </div>

  <!-- Camera preview -->
  <div class="camera-section">
    <video id="camera-feed" playsinline muted autoplay></video>
    <canvas id="roi-canvas" class="roi-overlay"></canvas>
  </div>

  <!-- Live metrics -->
  <div class="metrics-grid">
    <div class="metric-card">
      <span class="metric-label">Heart Rate</span>
      <span class="metric-value" id="bpm-value">—</span>
      <span class="metric-unit">BPM</span>
    </div>
    <div class="metric-card">
      <span class="metric-label">Physio State</span>
      <span class="metric-value" style="font-size:18px;padding-top:4px" id="phys-state">unknown</span>
    </div>
  </div>

  <!-- Status pills -->
  <div class="status-row">
    <div class="status-pill">
      <div class="status-dot" id="dot-ws"></div>
      <span>WS&nbsp;<span id="ws-status">—</span></span>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="dot-signal"></div>
      <span>Signal&nbsp;<span id="signal-quality">waiting</span></span>
    </div>
  </div>

  <p id="status-msg">Initialising camera…</p>

</div>

<script src="/static/js/websocket.js"></script>
<script src="/static/js/camera.js"></script>
<script>
  // Draw ROI rectangle on canvas for Week 1 visual debug
  (function drawROI() {
    const video = document.getElementById('camera-feed');
    const canvas = document.getElementById('roi-canvas');
    const ctx = canvas.getContext('2d');
    video.addEventListener('loadedmetadata', () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const x = Math.floor(video.videoWidth  * 0.35);
      const y = Math.floor(video.videoHeight * 0.15);
      const w = Math.floor(video.videoWidth  * 0.30);
      const h = Math.floor(video.videoHeight * 0.35);
      ctx.strokeStyle = 'rgba(152,120,232,0.6)';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.strokeRect(x, y, w, h);
      ctx.font = '11px monospace';
      ctx.fillStyle = 'rgba(152,120,232,0.6)';
      ctx.fillText('ROI (Week 1 — replace with MediaPipe face mesh)', x + 4, y - 5);
    });
  })();

  // React to ws/signal status dots
  document.addEventListener('ws:open',  () => document.getElementById('dot-ws').className = 'status-dot ok');
  document.addEventListener('ws:close', () => document.getElementById('dot-ws').className = 'status-dot bad');
</script>
<script src="/static/js/app.js"></script>
</body>
</html>
